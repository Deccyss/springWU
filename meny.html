<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meny – Midlife Burger Crisis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="nav-backdrop" id="backdrop"></div>

<div class="nav-overlay" id="navOverlay">
    <p class="nav-label">Navigera</p>
    <nav>
        <a href="index.html">Hem</a>
        <a href="meny.html">Meny</a>
        <a href="lokaler.html">Lokaler</a>
        <a href="om-oss.html">Om oss</a>
    </nav>
</div>

<header class="header">
    <a class="logo" href="index.html">
        <img class="logo-icon" src="img/Midlife Burger Crisis.png" alt="Midlife Burger Crisis logga">
        <div class="logo-text">
            <span class="logo-title">Midlife Burger Crisis</span>
            <span class="logo-sub">Est. 2024 &mdash; Göteborg</span>
        </div>
    </a>
    <div class="hamburger" id="hamburger" aria-label="Öppna meny" role="button" tabindex="0">
        <span></span>
        <span></span>
        <span></span>
    </div>
</header>

<main class="meny-layout">


    <aside class="meny-aside">
        <h2 class="text">Drinkar</h2>
    
        <div class="meny-sektion">
            <h3 class="meny-kategori">Alkoholfritt</h3>
            <h2 class="booking-title">Pepsi MAX 39kr</h2>
            <div class="meny-rad"></div>
            <div class="meny-rad"></div>
            <div class="meny-rad"></div>
        </div>
    
        <div class="meny-sektion">
            <h3 class="meny-kategori">Öl & Vin</h3>
            <h2 class="booking-title">Vitt Vin -120</h2>
            <div class="meny-rad"></div>
            <div class="meny-rad"></div>
            <div class="meny-rad"></div>
        </div>
    
        <div class="meny-sektion">
            <h3 class="meny-kategori">Cocktails</h3>
            <h2 class="booking-title">Mohito 90kr</h2>
            <div class="meny-rad"></div>
            <div class="meny-rad"></div>
            <div class="meny-rad"></div>
        </div>
    </aside>


    <section class="meny-content">
        <div class="meny-bild-wrapper">
            <img src="img/burgermeny.png" alt="Vår meny" class="meny-bild">
        </div>
    </section>

</main>

<footer class="footer">
    <p class="text">Datum: 2026-04-19</p>
</footer>

<script>
    const hamburger = document.getElementById('hamburger');
    const navOverlay = document.getElementById('navOverlay');
    const backdrop   = document.getElementById('backdrop');

    function toggleMenu() {
        const isOpen = navOverlay.classList.toggle('open');
        hamburger.classList.toggle('open', isOpen);
        backdrop.classList.toggle('open', isOpen);
        document.body.style.overflow = isOpen ? 'hidden' : '';
    }

    hamburger.addEventListener('click', toggleMenu);
    backdrop.addEventListener('click', toggleMenu);
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && navOverlay.classList.contains('open')) toggleMenu();
    });
</script>
</body>
</html>
